<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macdonald's test project</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --surface: #ffffff;
      --primary: #1f2937;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --success: #16a34a;
      --border: #d1d5db;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      font-family: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #eef2ff 0%, #f7f8fc 40%, #e5e7eb 100%);
      color: var(--primary);
      line-height: 1.5;
    }

    .page-shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .brand-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.18), rgba(255, 255, 255, 0.9));
      border: 1px solid rgba(37, 99, 235, 0.14);
      box-shadow: var(--shadow);
    }

    .brand-bar h1 {
      margin: 0;
      font-size: clamp(1.8rem, 2.5vw, 2.6rem);
    }

    .brand-bar p {
      margin: 8px 0 0;
      color: #475569;
      max-width: 640px;
    }

    .grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.35rem;
      color: var(--accent-strong);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      font-weight: 600;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #f8fafc;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: #ffffff;
    }

    button,
    input[type='submit'] {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
    }

    input[type='submit'], .button-primary {
      background: var(--accent);
      color: #ffffff;
      width: 100%;
    }

    input[type='submit']:hover,
    .button-primary:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .message {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 14px;
      display: none;
      font-size: 0.98rem;
    }

    .message.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .hidden {
      display: none;
    }

    #dashboard p {
      margin: 0 0 16px;
      color: #475569;
    }

    @media (max-width: 640px) {
      .page-shell {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="brand-bar">
      <div>
        <h1>Macdonald's test project</h1>
        <p>WELCOME TO MACDONALD'S WEBSITE.</p>
      </div>
    </header>

    <main class="grid">
      <section class="card">
        <h2>Create an account</h2>
        <form id="signup-form">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required placeholder="Macdonald Wakhungu">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required placeholder="macdonald@example.com">
          </div>
          <div class="field">
            <label for="phone">Phone number</label>
            <input id="phone" name="phone" type="tel" required placeholder="254712345678">
          </div>
          <div class="field">
            <label for="password">Create password</label>
            <input id="password" name="password" type="password" required placeholder="••••••••">
          </div>
          <input type="submit" value="Sign Up">
          <div id="signup-status" class="message"></div>
        </form>
      </section>

      <section class="card">
        <h2>Login</h2>
        <form id="login-form">
          <div class="field">
            <label for="login-phone">Phone number</label>
            <input id="login-phone" name="phone" type="tel" required placeholder="254712345678">
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" required placeholder="••••••••">
          </div>
          <input type="submit" value="Log In">
          <div id="login-status" class="message"></div>
        </form>
      </section>

      <section id="dashboard" class="card hidden">
        <h2>Dashboard</h2>
        <p>Welcome back, <strong id="dashboard-user"></strong>.</p>
        <p>This is your dashboard area. Add your content here later, and the site will continue to use the stored user data.</p>
        <button id="logout" class="button-primary">Log Out</button>
      </section>
    </main>
  </div>

  <script>
    const signupForm = document.getElementById('signup-form');
    const loginForm = document.getElementById('login-form');
    const signupStatus = document.getElementById('signup-status');
    const loginStatus = document.getElementById('login-status');
    const dashboard = document.getElementById('dashboard');
    const dashboardUser = document.getElementById('dashboard-user');
    const logoutButton = document.getElementById('logout');

    function showMessage(element, message, type) {
      element.textContent = message;
      element.className = `message ${type}`;
      element.style.display = 'block';
    }

    function hideMessage(element) {
      element.textContent = '';
      element.style.display = 'none';
    }

    async function postJson(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      return response.json().then(data => ({ status: response.status, data }));
    }

    signupForm.addEventListener('submit', async event => {
      event.preventDefault();
      hideMessage(signupStatus);
      const payload = {
        name: signupForm.name.value.trim(),
        email: signupForm.email.value.trim(),
        phone: signupForm.phone.value.trim(),
        password: signupForm.password.value
      };
      const { status, data } = await postJson('/signup', payload);
      if (status === 200 && data.success) {
        showMessage(signupStatus, data.message, 'success');
        signupForm.reset();
      } else {
        showMessage(signupStatus, data.message || 'Signup failed.', 'error');
      }
    });

    loginForm.addEventListener('submit', async event => {
      event.preventDefault();
      hideMessage(loginStatus);
      const payload = {
        phone: loginForm.phone.value.trim(),
        password: loginForm.password.value
      };
      const { status, data } = await postJson('/login', payload);
      if (status === 200 && data.success) {
        showDashboard(data.name);
      } else {
        showMessage(loginStatus, data.message || 'Login failed.', 'error');
      }
    });

    function showDashboard(name) {
      dashboardUser.textContent = name;
      dashboard.classList.remove('hidden');
      signupForm.classList.add('hidden');
      loginForm.classList.add('hidden');
      hideMessage(signupStatus);
      hideMessage(loginStatus);
    }

    logoutButton.addEventListener('click', () => {
      dashboard.classList.add('hidden');
      signupForm.classList.remove('hidden');
      loginForm.classList.remove('hidden');
      hideMessage(signupStatus);
      hideMessage(loginStatus);
      loginForm.reset();
    });
  </script>
</body>
</html>
